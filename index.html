// offscreen image canvas
const ofc = document.createElement('canvas');
const ofc2 = document.createElement('canvas');

img.onload = () => {
  ofc.width = img.width; ofc.height = img.height;
  ofc.getContext('2d').drawImage(img, 0, 0);
  ofc2.width = img.width; ofc2.height = img.height;
  ofc2.getContext('2d').drawImage(img, 0, 0);
  startAnimation();
};

// ---- PHASES ----
// Each phase: { name, duration (ms), draw(t, ctx, W, H) }
// t = 0..1 normalized within phase

const IW = () => img.width;
const IH = () => img.height;

function fitRect(w, h, W, H) {
  const s = Math.min(W / w, H / h) * 0.7;
  return { w: w * s, h: h * s, s };
}

function drawImgTransformed(ctx, cx, cy, w, h, angle, skewX, skewY, scaleX, scaleY, alpha) {
  ctx.save();
  ctx.globalAlpha = Math.max(0, Math.min(1, alpha ?? 1));
  ctx.translate(cx, cy);
  ctx.rotate(angle ?? 0);
  ctx.transform(1, Math.tan(skewY ?? 0), Math.tan(skewX ?? 0), 1, 0, 0);
  ctx.scale(scaleX ?? 1, scaleY ?? 1);
  ctx.drawImage(img, -w / 2, -h / 2, w, h);
  ctx.restore();
}

// Ripple distortion via pixel manipulation
function drawDistorted(ctx, cx, cy, w, h, waveAmp, waveFreq, t2) {
  const tmp = document.createElement('canvas');
  tmp.width = Math.round(w); tmp.height = Math.round(h);
  const tc = tmp.getContext('2d');
  tc.drawImage(img, 0, 0, tmp.width, tmp.height);
  const src = tc.getImageData(0, 0, tmp.width, tmp.height);
  const dst = tc.createImageData(tmp.width, tmp.height);
  const sw = tmp.width, sh = tmp.height;
  for (let y = 0; y < sh; y++) {
    for (let x = 0; x < sw; x++) {
      const sx = x + waveAmp * Math.sin(y * waveFreq + t2 * Math.PI * 2);
      const sy = y + waveAmp * Math.sin(x * waveFreq + t2 * Math.PI * 2 + 1);
      const sx2 = Math.max(0, Math.min(sw - 1, Math.round(sx)));
      const sy2 = Math.max(0, Math.min(sh - 1, Math.round(sy)));
      const si = (sy2 * sw + sx2) * 4;
      const di = (y * sw + x) * 4;
      dst.data[di]     = src.data[si];
      dst.data[di + 1] = src.data[si + 1];
      dst.data[di + 2] = src.data[si + 2];
      dst.data[di + 3] = src.data[si + 3];
    }
  }
  tc.putImageData(dst, 0, 0);
  ctx.save();
  ctx.translate(cx - w / 2, cy - h / 2);
  ctx.drawImage(tmp, 0, 0);
  ctx.restore();
}

function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function elastic(t) { return Math.pow(2,-10*t)*Math.sin((t-.075)*6.28/.3)+1; }
function bounce(t) {
  if (t < 1/2.75) return 7.5625*t*t;
  if (t < 2/2.75) { t-=1.5/2.75; return 7.5625*t*t+.75; }
  if (t < 2.5/2.75) { t-=2.25/2.75; return 7.5625*t*t+.9375; }
  t-=2.625/2.75; return 7.5625*t*t+.984375;
}

// ---- CELLS STATE ----
let cells = [];
function initCells(n) {
  cells = [];
  const { w, h } = fitRect(IW(), IH(), W, H);
  for (let i = 0; i < n; i++) {
    cells.push({
      x: W / 2 + (Math.random() - 0.5) * W * 0.6,
      y: H / 2 + (Math.random() - 0.5) * H * 0.5,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.05,
      scale: 0.5 + Math.random() * 0.5,
      alpha: 1,
    });
  }
}

const PHASES = [
  {
    name: 'wave',
    dur: 3500,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      const amp = 30 * Math.sin(t * Math.PI);
      drawDistorted(ctx, W/2, H/2, w, h, amp, 0.08, t * 2);
    }
  },
  {
    name: 'bulge / squish',
    dur: 3000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      const bulge = Math.sin(t * Math.PI * 3);
      drawImgTransformed(ctx, W/2, H/2, w, h, 0, 0, 0,
        1 + bulge * 0.6, 1 - bulge * 0.4);
    }
  },
  {
    name: 'boom',
    dur: 2000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      const s = 1 + elastic(t) * 2.5;
      const alpha = 1 - t * 0.3;
      drawImgTransformed(ctx, W/2, H/2, w * s, h * s, 0, 0, 0, 1, 1, alpha);
      // shockwave ring
      ctx.save();
      ctx.strokeStyle = `rgba(100,180,255,${(1-t)*0.5})`;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(W/2, H/2, t * Math.max(W,H), 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    }
  },
  {
    name: 'inverse',
    dur: 2500,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      // draw normal
      ctx.save();
      ctx.translate(W/2, H/2);
      ctx.drawImage(img, -w/2, -h/2, w, h);
      ctx.restore();
      // invert via composite
      const inv = easeInOut(Math.abs(Math.sin(t * Math.PI * 2)));
      ctx.save();
      ctx.globalAlpha = inv;
      ctx.globalCompositeOperation = 'difference';
      ctx.fillStyle = 'white';
      ctx.fillRect(W/2-w/2, H/2-h/2, w, h);
      ctx.restore();
    }
  },
  {
    name: 'implode',
    dur: 2000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      const s = 1 - easeInOut(t) * 0.9;
      const alpha = 1 - t * 0.5;
      drawImgTransformed(ctx, W/2, H/2, w * s, h * s, 0, 0, 0, 1, 1, alpha);
      // implode rings
      for (let i = 0; i < 5; i++) {
        const r = (1 - t) * Math.max(W,H) * 0.5 * (1 - i * 0.15);
        ctx.save();
        ctx.strokeStyle = `rgba(180,100,255,${(1-t)*0.4})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(W/2, H/2, r, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }
  },
  {
    name: 'explode',
    dur: 2500,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      // explode into 12 pieces
      const pieces = 12;
      for (let i = 0; i < pieces; i++) {
        const angle = (i / pieces) * Math.PI * 2;
        const dist = easeInOut(t) * Math.max(W,H) * 0.4;
        const px = W/2 + Math.cos(angle) * dist;
        const py = H/2 + Math.sin(angle) * dist;
        const s = (1 - t * 0.7) * 0.25;
        const rot = t * Math.PI * 2 * (i % 2 ? 1 : -1);
        ctx.save();
        ctx.globalAlpha = 1 - t * 0.8;
        ctx.translate(px, py);
        ctx.rotate(rot);
        // clip to a wedge slice
        ctx.beginPath();
        const a1 = angle - Math.PI / pieces;
        const a2 = angle + Math.PI / pieces;
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, w, a1, a2);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, -w/2, -h/2, w * s * 4, h * s * 4);
        ctx.restore();
      }
    }
  },
  {
    name: 'spin',
    dur: 3000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      const rot = t * Math.PI * 4;
      const s = 0.5 + Math.abs(Math.cos(rot * 0.5)) * 0.5;
      drawImgTransformed(ctx, W/2, H/2, w, h, rot, 0, 0, s, s);
    }
  },
  {
    name: '3D rectangle',
    dur: 4000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      // perspective projection of a rotating rectangle
      const rotY = t * Math.PI * 2;
      const depth = 80;
      const cosR = Math.cos(rotY);
      const sinR = Math.sin(rotY);
      const hw = w / 2, hh = h / 2;

      // 4 corners in 3D, rotating around Y axis
      const corners3d = [
        [-hw, -hh, 0], [hw, -hh, 0], [hw, hh, 0], [-hw, hh, 0]
      ].map(([x, y, z]) => {
        const rx = x * cosR - z * sinR;
        const rz = x * sinR + z * cosR;
        return [rx, y, rz + depth];
      });

      const fov = 500;
      const proj = corners3d.map(([x, y, z]) => [
        W/2 + x * fov / (z + fov * 0.8),
        H/2 + y * fov / (z + fov * 0.8),
      ]);

      // use CSS 3D-like transform via canvas setTransform
      // map image corners to projected corners using homography (approx with transform)
      const [tl, tr, br, bl] = proj;

      ctx.save();
      // draw face only when visible (front-facing)
      if (Math.cos(rotY) > 0) {
        drawQuad(ctx, img, tl, tr, br, bl);
      } else {
        // back face: flipped horizontally
        drawQuad(ctx, img, tr, tl, bl, br);
      }
      ctx.restore();
    }
  },
  {
    name: 'paper plane',
    dur: 4000,
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);

      // figure-8 flight path
      const angle = t * Math.PI * 4;
      const px = W/2 + Math.sin(angle) * W * 0.35;
      const py = H/2 + Math.sin(angle * 0.5) * H * 0.25;
      const heading = Math.atan2(
        Math.cos(angle * 0.5) * H * 0.25 * 0.5,
        Math.cos(angle) * W * 0.35
      );

      // fold into paper plane shape
      const fold = easeInOut(Math.min(t * 4, 1));
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(heading);

      if (fold > 0.99) {
        // paper plane shape
        ctx.save();
        ctx.scale(0.4 + 0.1 * Math.sin(t * 20), 0.4);
        // left wing
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(-w*0.6, h*0.1); ctx.lineTo(0, h*0.05);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, -w*0.3, -h*0.25, w*0.6, h*0.5);
        ctx.restore();
        // right wing
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(w*0.6, h*0.1); ctx.lineTo(0, h*0.05);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, -w*0.3, -h*0.25, w*0.6, h*0.5);
        ctx.restore();
        ctx.restore();
      } else {
        // folding animation
        ctx.save();
        ctx.scale(1, 1 - fold * 0.6);
        ctx.drawImage(img, -w/2, -h/2, w, h);
        ctx.restore();
      }
      ctx.restore();
    }
  },
  {
    name: 'cell split',
    dur: 3500,
    initPhase() {
      const { w, h } = fitRect(IW(), IH(), W, H);
      cells = [{ x: W/2, y: H/2, vx: 0, vy: 0, rot: 0, vrot: 0, scale: 1, alpha: 1, w, h }];
    },
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);

      if (t < 0.5) {
        // pulsate
        const pulse = 1 + Math.sin(t * Math.PI * 8) * 0.1;
        drawImgTransformed(ctx, W/2, H/2, w * pulse, h / pulse, 0, 0, 0, 1, 1);
      } else {
        // split into two
        const st = (t - 0.5) * 2;
        const sep = easeInOut(st) * w * 0.55;
        // stretch before split
        const stretch = st < 0.5 ? 1 + st * 0.4 : 1;
        // left cell
        drawImgTransformed(ctx, W/2 - sep, H/2, w * 0.55, h * 0.55, 0, 0, 0, stretch, 1/stretch);
        // right cell
        drawImgTransformed(ctx, W/2 + sep, H/2, w * 0.55, h * 0.55, 0, 0, 0, stretch, 1/stretch);
      }
    }
  },
  {
    name: 'multiply',
    dur: 8000,
    initPhase() {
      const { w, h } = fitRect(IW(), IH(), W, H);
      const cw = w * 0.55, ch = h * 0.55;
      cells = [
        { x: W/2 - cw * 0.5, y: H/2, vx: -0.8, vy: (Math.random()-0.5)*1, rot: 0, vrot: 0.01, scale: 1, alpha: 1, w: cw, h: ch, born: 0, splitting: false },
        { x: W/2 + cw * 0.5, y: H/2, vx:  0.8, vy: (Math.random()-0.5)*1, rot: 0, vrot: -0.01, scale: 1, alpha: 1, w: cw, h: ch, born: 0, splitting: false },
      ];
    },
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const elapsed = t * 8000;
      const maxCells = 512;

      // split logic: every 1.2s, any non-splitting cell > 0.3s old spawns two children
      const splitInterval = 1200;
      const splitGen = Math.floor(elapsed / splitInterval);

      // rebuild cells exponentially by generation
      if (cells.length < maxCells) {
        const targetCount = Math.min(maxCells, Math.pow(2, splitGen + 1));
        while (cells.length < targetCount) {
          const parent = cells[Math.floor(Math.random() * cells.length)];
          const newScale = parent.scale * 0.72;
          const offset = (parent.w * newScale) * 0.6;
          const ang = Math.random() * Math.PI * 2;
          cells.push({
            x: parent.x + Math.cos(ang) * offset,
            y: parent.y + Math.sin(ang) * offset,
            vx: parent.vx + (Math.random()-0.5)*2,
            vy: parent.vy + (Math.random()-0.5)*2,
            rot: parent.rot,
            vrot: (Math.random()-0.5)*0.08,
            scale: newScale,
            alpha: 1,
            w: parent.w * 0.72,
            h: parent.h * 0.72,
            born: elapsed,
          });
        }
      }

      // update & draw
      for (const c of cells) {
        c.x += c.vx;
        c.y += c.vy;
        c.rot += c.vrot;
        // bounce off walls
        if (c.x < 0 || c.x > W) c.vx *= -1;
        if (c.y < 0 || c.y > H) c.vy *= -1;
        c.x = Math.max(0, Math.min(W, c.x));
        c.y = Math.max(0, Math.min(H, c.y));

        ctx.save();
        ctx.globalAlpha = c.alpha;
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        const s = c.scale;
        ctx.drawImage(img, -c.w/2 * s, -c.h/2 * s, c.w * s, c.h * s);
        ctx.restore();
      }
    }
  },
];

// --- homography quad draw ---
function drawQuad(ctx, imgSrc, tl, tr, br, bl) {
  // split into 2 triangles, approximate with many horizontal strips
  const steps = 40;
  for (let i = 0; i < steps; i++) {
    const t0 = i / steps, t1 = (i + 1) / steps;
    // interpolate left/right edges
    const lx0 = tl[0] + (bl[0]-tl[0])*t0, ly0 = tl[1] + (bl[1]-tl[1])*t0;
    const rx0 = tr[0] + (br[0]-tr[0])*t0, ry0 = tr[1] + (br[1]-tr[1])*t0;
    const lx1 = tl[0] + (bl[0]-tl[0])*t1, ly1 = tl[1] + (bl[1]-tl[1])*t1;
    const rx1 = tr[0] + (br[0]-tr[0])*t1, ry1 = tr[1] + (br[1]-tr[1])*t1;
    const subSteps = 40;
    for (let j = 0; j < subSteps; j++) {
      const s0 = j / subSteps, s1 = (j+1)/subSteps;
      const x00 = lx0+(rx0-lx0)*s0, y00 = ly0+(ry0-ly0)*s0;
      const x10 = lx0+(rx0-lx0)*s1, y10 = ly0+(ry0-ly0)*s1;
      const x01 = lx1+(rx1-lx1)*s0, y01 = ly1+(ry1-ly1)*s0;
      const x11 = lx1+(rx1-lx1)*s1, y11 = ly1+(ry1-ly1)*s1;
      const srcX = s0 * imgSrc.width;
      const srcY = t0 * imgSrc.height;
      const srcW = (s1-s0) * imgSrc.width + 1;
      const srcH = (t1-t0) * imgSrc.height + 1;
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x00,y00); ctx.lineTo(x10,y10);
      ctx.lineTo(x11,y11); ctx.lineTo(x01,y01);
      ctx.closePath();
      ctx.clip();
      // compute transform
      const dx = x10-x00, dy = y10-y00;
      const dxb = x01-x00, dyb = y01-y00;
      const scaleX = Math.sqrt(dx*dx+dy*dy)/srcW;
      const scaleY = Math.sqrt(dxb*dxb+dyb*dyb)/srcH;
      const ang = Math.atan2(dy, dx);
      ctx.translate(x00, y00);
      ctx.rotate(ang);
      ctx.scale(scaleX, scaleY);
      ctx.drawImage(imgSrc, srcX, srcY, srcW, srcH, 0, 0, srcW, srcH);
      ctx.restore();
    }
  }
}

// ---- SPERM / FERTILIZATION STATE ----
let spermCells = [];
let eggPos = { x: 0, y: 0, r: 0 };
let fertilized = false;
let fertTime = 0;

function initSpermPhase() {
  fertilized = false;
  fertTime = 0;
  eggPos = { x: W * 0.62, y: H * 0.5, r: Math.min(W, H) * 0.12 };
  const { w, h } = fitRect(IW(), IH(), W, H);
  const imgCW = w * 0.55, imgCH = h * 0.55;
  // spawn ~60 sperm cells at random edges of the image
  spermCells = [];
  for (let i = 0; i < 60; i++) {
    // start from various spots around a central cluster (the image breaking apart)
    const ang = Math.random() * Math.PI * 2;
    const startR = Math.min(imgCW, imgCH) * 0.4 * Math.random();
    const sx = W * 0.38 + Math.cos(ang) * startR;
    const sy = H * 0.5 + Math.sin(ang) * startR * 0.7;
    // some head toward egg, others wander
    const bias = Math.random() < 0.7 ? 1 : 0;
    spermCells.push({
      x: sx, y: sy,
      targetAngle: Math.atan2(eggPos.y - sy, eggPos.x - sx),
      wanderAngle: Math.random() * Math.PI * 2,
      speed: 1.2 + Math.random() * 1.8,
      tailPhase: Math.random() * Math.PI * 2,
      size: 6 + Math.random() * 6,
      bias,
      alive: true,
      reached: false,
    });
  }
}

function drawSperm(ctx, x, y, angle, size, tailPhase, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);

  // head: oval
  ctx.beginPath();
  ctx.ellipse(0, 0, size, size * 0.55, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#e8d8ff';
  ctx.fill();
  ctx.strokeStyle = 'rgba(200,160,255,0.8)';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // tail: wavy sine
  ctx.beginPath();
  ctx.moveTo(-size, 0);
  const segments = 18;
  const tailLen = size * 5;
  for (let i = 1; i <= segments; i++) {
    const tx = -size - (tailLen * i / segments);
    const ty = Math.sin(tailPhase + i * 0.6) * size * 0.55 * (i / segments);
    if (i === 1) ctx.moveTo(-size, 0);
    ctx.lineTo(tx, ty);
  }
  ctx.strokeStyle = 'rgba(180,130,255,0.7)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  ctx.restore();
}

function drawEgg(ctx, x, y, r, glow, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // outer glow halo
  const grad = ctx.createRadialGradient(x, y, r * 0.7, x, y, r * 1.6);
  grad.addColorStop(0, `rgba(255,220,80,${glow * 0.45})`);
  grad.addColorStop(1, 'rgba(255,200,0,0)');
  ctx.beginPath();
  ctx.arc(x, y, r * 1.6, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
  // clip to circle and draw the photo inside
  ctx.save();
  ctx.beginPath();
  ctx.arc(x, y, r * 0.92, 0, Math.PI * 2);
  ctx.clip();
  const d = r * 0.92 * 2;
  ctx.drawImage(img, x - r * 0.92, y - r * 0.92, d, d);
  ctx.restore();
  // outer membrane ring
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,210,80,${0.55 + glow * 0.35})`;
  ctx.lineWidth = 3.5;
  ctx.stroke();
  ctx.restore();
}

PHASES.push(
  {
    name: 'dissolve to sperm',
    dur: 3000,
    initPhase() { initSpermPhase(); },
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      // image fades and breaks into sperm
      ctx.save();
      ctx.globalAlpha = 1 - easeInOut(t);
      ctx.translate(W * 0.38, H / 2);
      const wobble = t * 0.3;
      ctx.drawImage(img, -w * (1 - wobble * 0.2) / 2, -h / 2, w * (1 - wobble * 0.2), h);
      ctx.restore();
      // egg fades in
      drawEgg(ctx, eggPos.x, eggPos.y, eggPos.r * easeInOut(t), easeInOut(t), easeInOut(t));
      // sperm appear
      const appear = easeInOut(t);
      for (const s of spermCells) {
        drawSperm(ctx, s.x, s.y, s.wanderAngle, s.size, s.tailPhase + t * 20, appear * 0.8);
      }
    }
  },
  {
    name: 'fertilization',
    dur: 5000,
    initPhase() {
      // reset positions closer to the egg's left
      for (const s of spermCells) {
        const ang = Math.random() * Math.PI * 2;
        const startR = Math.min(W, H) * (0.35 + Math.random() * 0.25);
        s.x = eggPos.x + Math.cos(ang) * startR;
        s.y = eggPos.y + Math.sin(ang) * startR;
        s.targetAngle = Math.atan2(eggPos.y - s.y, eggPos.x - s.x);
        s.wanderAngle = s.targetAngle + (Math.random() - 0.5) * 0.8;
        s.alive = true;
        s.reached = false;
      }
      fertilized = false;
      fertTime = 0;
    },
    draw(t, ctx) {
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      const elapsed = t * 5000;
      const glow = fertilized ? Math.min((elapsed - fertTime) / 500, 1) : 0;

      drawEgg(ctx, eggPos.x, eggPos.y, eggPos.r, 0.5 + glow, 1);

      for (const s of spermCells) {
        if (!s.alive) continue;
        s.tailPhase += 0.18;

        // steer toward egg with some wander
        const toEggAngle = Math.atan2(eggPos.y - s.y, eggPos.x - s.x);
        let angleDiff = toEggAngle - s.wanderAngle;
        // normalize
        while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
        while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;
        s.wanderAngle += angleDiff * (s.bias ? 0.06 : 0.015) + (Math.random() - 0.5) * 0.1;
        s.x += Math.cos(s.wanderAngle) * s.speed;
        s.y += Math.sin(s.wanderAngle) * s.speed;

        const dx = s.x - eggPos.x, dy = s.y - eggPos.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < eggPos.r * 0.95 && !fertilized) {
          fertilized = true;
          fertTime = elapsed;
          s.reached = true;
          s.alive = false;
        } else if (dist < eggPos.r * 1.05 && fertilized) {
          s.alive = false; // blocked
        }

        if (s.alive) {
          drawSperm(ctx, s.x, s.y, s.wanderAngle, s.size, s.tailPhase, 0.85);
        }
      }

      // fertilization flash ring
      if (fertilized) {
        const ft = Math.min((elapsed - fertTime) / 800, 1);
        ctx.save();
        ctx.strokeStyle = `rgba(255,240,100,${(1 - ft) * 0.9})`;
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.arc(eggPos.x, eggPos.y, eggPos.r + ft * eggPos.r * 1.5, 0, Math.PI * 2);
        ctx.stroke();
        // second ring
        ctx.strokeStyle = `rgba(255,180,30,${(1 - ft) * 0.5})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(eggPos.x, eggPos.y, eggPos.r + ft * eggPos.r * 2.5, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }
  },
  {
    name: 'flashbang',
    dur: 1800,
    draw(t, ctx) {
      // background stays black initially, egg visible
      ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
      // draw egg shrinking into the flash
      const shrink = 1 - easeInOut(Math.min(t * 3, 1)) * 0.5;
      drawEgg(ctx, eggPos.x, eggPos.y, eggPos.r * shrink, 1, 1 - t * 0.5);
      // white flash
      const flashT = easeInOut(Math.min(t * 2, 1));
      const fadeOut = t > 0.5 ? easeInOut((t - 0.5) * 2) : 0;
      const alpha = Math.max(0, Math.min(1, flashT - fadeOut * 0.8));
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  },
  {
    name: 'rebirth',
    dur: 2500,
    draw(t, ctx) {
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
      const { w, h } = fitRect(IW(), IH(), W, H);
      // fade white out, image fades back in
      ctx.save();
      ctx.globalAlpha = 1 - easeInOut(t);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = easeInOut(t);
      const s = 0.5 + easeInOut(t) * 0.5;
      ctx.translate(W / 2, H / 2);
      ctx.scale(s, s);
      ctx.drawImage(img, -w / 2, -h / 2, w, h);
      ctx.restore();
    }
  }
);

// ---- ANIMATION LOOP ----
let phaseIdx = 0;
let phaseStart = null;

function startAnimation() {
  phaseStart = performance.now();
  if (PHASES[0].initPhase) PHASES[0].initPhase();
  requestAnimationFrame(loop);
}

function loop(now) {
  window._currentPhaseIdx = phaseIdx;
  const phase = PHASES[phaseIdx];
  if (!phaseStart) phaseStart = now;
  let elapsed = now - phaseStart;
  let t = Math.min(elapsed / phase.dur, 1);

  phase.draw(t, ctx);



  if (t >= 1) {
    phaseIdx = (phaseIdx + 1) % PHASES.length;
    phaseStart = now;
    if (PHASES[phaseIdx].initPhase) PHASES[phaseIdx].initPhase();
  }

  requestAnimationFrame(loop);
}
</script>

    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.04em;
    pointer-events: none;
  }
  #social-labels span {
    width: 66px;
    text-align: center;
    color: white; /* overridden by rainbow JS */
  }
</style>

<script>
  // ---- AUDIO ----
  (function() {
    const audio = document.getElementById('bgAudio');
    audio.volume = 0.4;
    const startAudio = () => {
      audio.play().catch(() => {});
      document.removeEventListener('click', startAudio);
      document.removeEventListener('keydown', startAudio);
      document.removeEventListener('touchstart', startAudio);
    };
    document.addEventListener('click', startAudio);
    document.addEventListener('keydown', startAudio);
    document.addEventListener('touchstart', startAudio);
    audio.play().catch(() => {});
  })();

  // ---- RAINBOW HUE for icons + labels (synced) ----
  (function() {
    const icons = document.querySelectorAll('#social-icons a');
    const labels = document.querySelectorAll('#social-labels span');
    const iconCount = icons.length;
    function updateRainbow(ts) {
      const base = (ts / 3000) * 360;
      icons.forEach((a, i) => {
        const hue = (base + i * (360 / iconCount)) % 360;
        const col = `hsl(${hue}, 90%, 65%)`;
        a.style.color = col;
      });
      labels.forEach((s, i) => {
        const hue = (base + i * (360 / iconCount)) % 360;
        s.style.color = `hsl(${hue}, 90%, 65%)`;
      });
      requestAnimationFrame(updateRainbow);
    }
    requestAnimationFrame(updateRainbow);
  })();

  // ---- DVD TEXT OVERLAY ----
  (function() {
    const REBIRTH_PHASE_IDX = 14; // index of 'rebirth' in PHASES

    const tc = document.getElementById('textCanvas');
    const tx = tc.getContext('2d');
    const TEXT = 'Darbimantas Marfėnia';
    const FONT_SIZE = 22;
    const FONT = `700 ${FONT_SIZE}px 'Inter', sans-serif`;

    function resizeTC() {
      tc.width = window.innerWidth;
      tc.height = window.innerHeight;
    }
    resizeTC();
    window.addEventListener('resize', resizeTC);

    // Measure text
    tx.font = FONT;
    const TW = tx.measureText(TEXT).width + 4;
    const TH = FONT_SIZE * 1.4;

    // One bouncing text instance
    class TextBall {
      constructor(hueOffset) {
        this.hueOffset = hueOffset || 0;
        this.reset(true);
      }
      reset(randomPos) {
        if (randomPos) {
          this.x = Math.random() * (tc.width - TW);
          this.y = TH + Math.random() * (tc.height - TH * 2);
        } else {
          this.x = 0;
          this.y = TH;
        }
        const speed = 1.2 + Math.random() * 0.8;
        const angle = Math.random() * Math.PI * 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        const W = tc.width, H = tc.height;
        if (this.x < 0) { this.x = 0; this.vx = Math.abs(this.vx); }
        if (this.x + TW > W) { this.x = W - TW; this.vx = -Math.abs(this.vx); }
        if (this.y < TH) { this.y = TH; this.vy = Math.abs(this.vy); }
        if (this.y > H - 4) { this.y = H - 4; this.vy = -Math.abs(this.vy); }
      }
      draw(ts) {
        const hue = ((ts / 2500) * 360 + this.hueOffset) % 360;
        tx.font = FONT;
        tx.fillStyle = `hsl(${hue}, 90%, 62%)`;
        tx.shadowColor = `hsl(${hue}, 90%, 50%)`;
        tx.shadowBlur = 8;
        tx.fillText(TEXT, this.x, this.y);
        tx.shadowBlur = 0;
      }
    }

    // Texts array — starts with 1, grows, resets to 1 on rebirth
    let texts = [new TextBall(0)];
    // Split timer: every ~2s spawn another while not in rebirth
    let lastSplit = 0;
    let inRebirth = false;

    function textLoop(ts) {
      // Check phase index via global (exposed from main animation)
      const curPhase = window._currentPhaseIdx !== undefined ? window._currentPhaseIdx : -1;
      if (curPhase === REBIRTH_PHASE_IDX) {
        if (!inRebirth) {
          inRebirth = true;
          texts = [new TextBall(0)];
          texts[0].x = tc.width / 2 - TW / 2;
          texts[0].y = tc.height / 2;
          texts[0].vx = 1;
          texts[0].vy = 0.7;
        }
      } else {
        if (inRebirth) inRebirth = false;
        // Spawn new ones every 2.5s, up to a lot
        if (ts - lastSplit > 2500 && texts.length < 80) {
          const parent = texts[Math.floor(Math.random() * texts.length)];
          const child = new TextBall((texts.length * 137) % 360);
          child.x = parent.x;
          child.y = parent.y;
          child.vx = -parent.vy + (Math.random()-0.5)*0.5;
          child.vy = parent.vx + (Math.random()-0.5)*0.5;
          texts.push(child);
          lastSplit = ts;
        }
      }

      tx.clearRect(0, 0, tc.width, tc.height);
      texts.forEach(t => { t.update(); t.draw(ts); });
      requestAnimationFrame(textLoop);
    }
    requestAnimationFrame(textLoop);
  })();
</script>
</body>
</html>
